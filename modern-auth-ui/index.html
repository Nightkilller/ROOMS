<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: rgba(255, 255, 255, 0.6);
            --accent: #5e6ad2;
            --accent-hover: #6f7cf0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.2);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: var(--primary);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .auth-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Ambient Glow Behind Card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(94, 106, 210, 0.1) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--secondary);
            font-size: 16px;
            font-weight: 500;
            padding: 12px 0;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 50%;
            background: var(--accent);
            border-radius: 2px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent);
        }

        .form-container {
            position: relative;
            min-height: 280px;
            /* To prevent height jumping */
        }

        .form-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px) scale(0.98);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .form-section.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: all;
            position: relative;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--secondary);
            margin-bottom: 8px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(94, 106, 210, 0.15);
        }

        .input-field:focus+label {
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(94, 106, 210, 0.3);
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(94, 106, 210, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: scale(0.5);
            pointer-events: none;
        }

        .submit-btn:hover::after {
            opacity: 1;
            transform: scale(1);
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            margin-top: -10px;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--accent-hover);
            text-shadow: 0 0 8px rgba(94, 106, 210, 0.6);
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
                border: none;
                border-radius: 0;
                background: rgba(5, 5, 5, 0.6);
                backdrop-filter: blur(25px);
                -webkit-backdrop-filter: blur(25px);
            }

            .auth-wrapper {
                padding: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Neural Network Animated Background -->
    <canvas id="neuralCanvas"></canvas>

    <div class="auth-wrapper">
        <div class="glass-card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
                <div class="tab-indicator" id="indicator"></div>
            </div>

            <div class="form-container">
                <!-- Login Form -->
                <form id="login-form" class="form-section active" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" class="input-field" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" class="input-field" placeholder="••••••••" required>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="form-section" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" class="input-field" placeholder="johndoe" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" class="input-field" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" class="input-field" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" class="input-field" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- UI Logic ---
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const indicator = document.getElementById('indicator');
            const btns = document.querySelectorAll('.tab-btn');

            btns.forEach(btn => btn.classList.remove('active'));

            if (tab === 'login') {
                btns[0].classList.add('active');
                indicator.style.transform = 'translateX(0)';
                registerForm.classList.remove('active');
                setTimeout(() => loginForm.classList.add('active'), 100);
            } else {
                btns[1].classList.add('active');
                indicator.style.transform = 'translateX(100%)';
                loginForm.classList.remove('active');
                setTimeout(() => registerForm.classList.add('active'), 100);
            }
        }

        // --- Canvas Premium "Sleek Digital Grid Beams" Animation ---
// Inspired by official Vercel/Stripe/Linear landing pages
const canvas = document.getElementById('neuralCanvas');
const ctx = canvas.getContext('2d');

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Grid settings
const cellSize = 60; // Sleek, spacious grid
const speed = 2; // Smooth, continuous pixel movement

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

// Premium brand colors
const colors = [
    '#ffffff', // Clean white
    '#ffffff', 
    '#ffffff', 
    '#00f0ff', // Cyber cyan
    '#7000ff', // Deep violet
    '#ff0055'  // Neon pink/red
];

class LightBeam {
    constructor() {
        this.reset(true);
    }

    reset(randomizeStart = false) {
        // Snap to grid
        this.x = Math.floor(Math.random() * ((width / cellSize) + 2)) * cellSize - cellSize;
        this.y = Math.floor(Math.random() * ((height / cellSize) + 2)) * cellSize - cellSize;
        
        this.dir = Math.floor(Math.random() * 4); // 0:R, 1:D, 2:L, 3:U
        this.vx = 0;
        this.vy = 0;
        this.updateVelocity();
        
        this.history = [];
        // Long, elegant fading trails
        this.targetLength = Math.floor(Math.random() * 150) + 100;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.isDead = false;

        if (randomizeStart) {
            // Simulate having already moved so they don't all spawn as dots
            const advance = Math.floor(Math.random() * this.targetLength);
            for(let i=0; i<advance; i++) this.updatePosition();
        }
    }

    updateVelocity() {
        if (this.dir === 0) { this.vx = speed; this.vy = 0; }
        else if (this.dir === 1) { this.vx = 0; this.vy = speed; }
        else if (this.dir === 2) { this.vx = -speed; this.vy = 0; }
        else if (this.dir === 3) { this.vx = 0; this.vy = -speed; }
    }

    updatePosition() {
        this.x += this.vx;
        this.y += this.vy;

        this.history.unshift({x: this.x, y: this.y});
        if (this.history.length > this.targetLength) {
            this.history.pop();
        }

        // Check if exactly at a grid intersection
        if (this.x % cellSize === 0 && this.y % cellSize === 0) {
            // Prevent going out of bounds by dying and respawning if entirely off-screen
            // This prevents the visual "wrap around" jump which looks unpolished
            if (this.x < -cellSize * 2 || this.x > width + cellSize * 2 || 
                this.y < -cellSize * 2 || this.y > height + cellSize * 2) {
                this.isDead = true;
                return;
            }

            // Smooth randomized turns at intersections (30% chance)
            if (Math.random() < 0.3) {
                // Determine left or right turn
                const turnDir = Math.random() < 0.5 ? 1 : 3;
                this.dir = (this.dir + turnDir) % 4;
                this.updateVelocity();
            }
        }
    }

    update() {
        if (this.isDead) {
            // Shrink tail
            this.history.pop();
            this.history.pop(); // shrink twice as fast
            if (this.history.length <= 0) {
                this.reset();
            }
        } else {
            this.updatePosition();
        }
    }

    draw() {
        if (this.history.length < 2) return;

        // Draw the sleek fading tail
        // To make it incredibly smooth, we draw small line segments connecting history points
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Performance optimization: we don't need to draw every single 2px segment individually.
        // But for a perfect alpha fade, segmenting is easiest.
        // Let's use step=4 to reduce paths by 4x, maintaining visual perfection
        const step = 4;
        for (let i = 0; i < this.history.length - step; i += step) {
            const p1 = this.history[i];
            const p2 = this.history[i + step];
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            
            // Fade alpha based on position in trail
            ctx.globalAlpha = Math.max(0, 1 - (i / this.history.length));
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 1.8; // Sleek thin line
            
            // Add slight glow close to the head
            if (i < 20) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.stroke();
        }
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
        
        // Draw the glowing head
        const head = this.history[0];
        ctx.beginPath();
        ctx.arc(head.x, head.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff'; // Intensely bright white core for head
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

const beams = [];
// More beams for a denser, more active premium background (like Stripe)
for (let i = 0; i < 40; i++) {
    beams.push(new LightBeam());
}

function drawGridLayer() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)'; // Extremely subtle, premium grid
    ctx.lineWidth = 1;
    ctx.beginPath();
    
    for (let x = 0; x <= width + cellSize; x += cellSize) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
    }
    for (let y = 0; y <= height + cellSize; y += cellSize) {
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
    }
    ctx.stroke();

    // Premium detail: Little plus signs or brighter dots at intersections
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    for (let x = 0; x <= width + cellSize; x += cellSize) {
        for (let y = 0; y <= height + cellSize; y += cellSize) {
            ctx.fillRect(x - 1, y - 1, 2, 2);
        }
    }
}

function animate() {
    // Sleek, deep dark premium gradient background
    const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height) * 0.8);
    gradient.addColorStop(0, '#0f1015'); // Slightly lighter, cool bluish-grey dark center
    gradient.addColorStop(1, '#020205'); // Deep abyss edge
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    drawGridLayer();

    ctx.globalCompositeOperation = 'screen'; // Makes beams glow nicely when overlapping
    for (let b of beams) {
        b.update();
        b.draw();
    }
    ctx.globalCompositeOperation = 'source-over';

    requestAnimationFrame(animate);
}

animate();
</script>
</body>

</html>
